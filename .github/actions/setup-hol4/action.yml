name: 'Setup HOL4'
description: 'Builds/restores HOL4 and sets HOLDIR'

inputs:
  hol4-ref:
    description: 'HOL4 git ref to use'
    required: false
    default: '4c96b9aa25da4f9066a500c13a9abe03252e3bae'
  polyml-rev:
    description: 'Resolved Poly/ML revision, used in cache key'
    required: true

outputs:
  hol4-rev:
    description: 'Resolved HOL4 git revision'
    value: ${{ steps.version.outputs.hol4-rev }}

runs:
  using: 'composite'
  steps:
    - name: Resolve HOL4 version
      id: version
      shell: bash
      run: |
        hol4=${{ inputs.hol4-ref }}
        echo "hol4-rev=$hol4" >> "$GITHUB_OUTPUT"

    - name: Cache HOL4
      uses: actions/cache@v4
      id: cache-hol4
      with:
        path: ~/HOL
        key: hol-${{ runner.os }}-${{ inputs.polyml-rev }}-${{ steps.version.outputs.hol4-rev }}

    - name: Build HOL4
      if: steps.cache-hol4.outputs.cache-hit != 'true'
      shell: bash
      run: |
        git clone https://github.com/HOL-Theorem-Prover/HOL.git ~/HOL
        cd ~/HOL
        git checkout --detach "${{ steps.version.outputs.hol4-rev }}"
        poly < tools/smart-configure.sml
        bin/build

    - name: Add HOL4 to PATH and set HOLDIR
      shell: bash
      run: |
        echo "$HOME/HOL/bin" >> "$GITHUB_PATH"
        echo "HOLDIR=$HOME/HOL" >> "$GITHUB_ENV"

name: 'Setup holbuild'
description: 'Checks out pinned holbuild, builds it, and adds it to PATH'

inputs:
  holbuild-repo:
    required: false
    default: 'https://github.com/charles-cooper/holbuild.git'
    description: 'holbuild repository URL'
  holbuild-ref:
    required: true
    description: 'holbuild git revision to use'
  hol4-ref:
    required: false
    default: 'bf0dec986904cecbd1a1c6bce62ccf1c256eaca1'
    description: 'HOL4 revision used to build holbuild itself'

outputs:
  holbuild-rev:
    description: 'Resolved holbuild revision'
    value: ${{ steps.version.outputs.holbuild-rev }}

runs:
  using: 'composite'
  steps:
    - name: Set holbuild revision
      id: version
      shell: bash
      run: echo "holbuild-rev=${{ inputs.holbuild-ref }}" >> "$GITHUB_OUTPUT"

    - name: Cache bootstrap HOL4
      uses: actions/cache@v5
      id: cache-bootstrap-hol4
      with:
        path: ~/HOL-bootstrap
        key: holbuild-bootstrap-hol-${{ runner.os }}-${{ inputs.hol4-ref }}

    - name: Build bootstrap HOL4
      if: steps.cache-bootstrap-hol4.outputs.cache-hit != 'true'
      shell: bash
      run: |
        git clone https://github.com/HOL-Theorem-Prover/HOL.git "$HOME/HOL-bootstrap"
        cd "$HOME/HOL-bootstrap"
        git checkout --detach "${{ inputs.hol4-ref }}"
        poly < tools/smart-configure.sml
        bin/build

    - name: Cache holbuild checkout/build
      uses: actions/cache@v5
      id: cache-holbuild
      with:
        path: ~/holbuild
        key: holbuild-tool-${{ runner.os }}-${{ steps.version.outputs.holbuild-rev }}-${{ inputs.hol4-ref }}

    - name: Clone holbuild
      shell: bash
      run: |
        if [ ! -d "$HOME/holbuild/.git" ]; then
          git clone "${{ inputs.holbuild-repo }}" "$HOME/holbuild"
        fi

    - name: Checkout holbuild revision
      shell: bash
      run: |
        cd "$HOME/holbuild"
        git fetch origin "${{ steps.version.outputs.holbuild-rev }}"
        git checkout --detach "${{ steps.version.outputs.holbuild-rev }}"

    - name: Build holbuild
      shell: bash
      run: |
        cd "$HOME/holbuild"
        make HOLDIR="$HOME/HOL-bootstrap"

    - name: Add holbuild to PATH
      shell: bash
      run: echo "$HOME/holbuild/bin" >> "$GITHUB_PATH"

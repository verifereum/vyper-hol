name: 'Setup Verifereum'
description: 'Clones/restores Verifereum source tree and sets VFMDIR'

inputs:
  polyml-rev:
    description: 'Resolved Poly/ML revision, used in cache key'
    required: false
    default: ''
  hol4-rev:
    description: 'Resolved HOL4 revision, used in cache key when non-empty'
    required: false
    default: ''

outputs:
  verifereum-rev:
    description: 'Resolved Verifereum git revision'
    value: ${{ steps.version.outputs.verifereum-rev }}

runs:
  using: 'composite'
  steps:
    - name: Read Verifereum pin
      id: version
      shell: bash
      run: echo "verifereum-rev=$(tr -d '[:space:]' < PINS/verifereum.txt)" >> "$GITHUB_OUTPUT"

    - name: Cache Verifereum source
      uses: actions/cache@v4
      id: cache-verifereum
      with:
        path: ~/verifereum
        key: verifereum-src-${{ runner.os }}-${{ steps.version.outputs.verifereum-rev }}

    - name: Clone Verifereum
      if: steps.cache-verifereum.outputs.cache-hit != 'true'
      shell: bash
      run: git clone https://github.com/verifereum/verifereum.git ~/verifereum

    - name: Checkout Verifereum revision
      shell: bash
      run: |
        cd ~/verifereum
        git fetch origin ${{ steps.version.outputs.verifereum-rev }}
        git checkout --detach ${{ steps.version.outputs.verifereum-rev }}

    - name: Set VFMDIR
      shell: bash
      run: echo "VFMDIR=$HOME/verifereum" >> "$GITHUB_ENV"

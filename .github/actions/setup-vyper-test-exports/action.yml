name: 'Setup Vyper test exports'
description: 'Exports/restores Vyper functional tests for generated HOL tests'

outputs:
  export-cache-key:
    description: 'Cache key for the exported tests'
    value: ${{ steps.vyper-rev.outputs.cache-key }}

runs:
  using: 'composite'
  steps:
    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Get Vyper revision
      id: vyper-rev
      shell: bash
      run: |
        sha=$(git ls-remote https://github.com/vyperlang/vyper.git HEAD | cut -f1)
        echo "cache-key=vyper-tests-${{ runner.os }}-$sha" >> "$GITHUB_OUTPUT"

    - name: Cache exported Vyper tests
      id: cache-vyper-tests
      uses: actions/cache@v5
      with:
        path: tests/vyper-test-exports
        key: ${{ steps.vyper-rev.outputs.cache-key }}

    - name: Export Vyper tests
      if: steps.cache-vyper-tests.outputs.cache-hit != 'true'
      shell: bash
      run: |
        git clone --depth 1 https://github.com/vyperlang/vyper.git vyper-src
        cd vyper-src
        git fetch --unshallow --tags
        pip install . --group test
        pytest -s -n0 --export ../tests/vyper-test-exports -m "not fuzzing" tests/functional

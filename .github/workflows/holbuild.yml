name: holbuild

on:
  workflow_dispatch:
    inputs:
      holbuild-ref:
        description: "holbuild git ref to test"
        required: false
        default: "master"
  pull_request:
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-polyml
        id: polyml
      - uses: ./.github/actions/setup-hol4
        id: hol4
        with:
          polyml-rev: ${{ steps.polyml.outputs.polyml-rev }}
      - uses: ./.github/actions/setup-verifereum
        id: verifereum
      - uses: ./.github/actions/setup-holbuild
        id: holbuild
        with:
          holbuild-ref: ${{ inputs.holbuild-ref || 'master' }}
      - uses: ./.github/actions/setup-vyper-test-exports
        id: vyper-test-exports

      - name: Configure holbuild cache
        run: echo "HOLBUILD_CACHE=$HOME/.cache/holbuild" >> "$GITHUB_ENV"

      - name: Restore holbuild global cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/holbuild
          key: holbuild-global-${{ runner.os }}-${{ steps.polyml.outputs.polyml-rev }}-${{ steps.hol4.outputs.hol4-rev }}-${{ steps.verifereum.outputs.verifereum-rev }}-${{ github.sha }}
          restore-keys: |
            holbuild-global-${{ runner.os }}-${{ steps.polyml.outputs.polyml-rev }}-${{ steps.hol4.outputs.hol4-rev }}-${{ steps.verifereum.outputs.verifereum-rev }}-
            holbuild-global-${{ runner.os }}-${{ steps.polyml.outputs.polyml-rev }}-${{ steps.hol4.outputs.hol4-rev }}-
            holbuild-global-${{ runner.os }}-

      - name: Run holbuild
        env:
          TMPDIR: ${{ runner.temp }}
        run: |
          holbuild --verbose --holdir "$HOLDIR" -j"$(nproc)" build --skip-checkpoints --skip-goalfrag \
            vyperHolTheory vyperTestAllTheory

      - name: Verify no successful-build checkpoints remain
        run: |
          if find .holbuild/checkpoints \( -name '*.save' -o -name '*.save.ok' \) 2>/dev/null | grep -q .; then
            echo "checkpoint files remained after holbuild run" >&2
            find .holbuild/checkpoints \( -name '*.save' -o -name '*.save.ok' \) 2>/dev/null | head -50 >&2
            exit 1
          fi
